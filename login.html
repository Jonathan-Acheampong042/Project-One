<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FileVault | Login</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><path d='M50 2 L90 15 L90 55 Q90 88 50 98 Q10 88 10 55 L10 15 Z' fill='url(%23g)'/><circle cx='40' cy='45' r='11' fill='white' opacity='.25'/><circle cx='50' cy='40' r='13' fill='white' opacity='.25'/><circle cx='61' cy='45' r='10' fill='white' opacity='.25'/><rect x='31' y='45' width='38' height='14' rx='2' fill='white' opacity='.25'/><rect x='42' y='51' width='16' height='12' rx='3' fill='white' opacity='.9'/><path d='M45 51 L45 47 Q50 41 55 47 L55 51' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' opacity='.9'/><circle cx='50' cy='56' r='2' fill='%236366f1'/><rect x='49' y='56' width='2' height='4' rx='1' fill='%236366f1'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        
        .floating-shapes {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }
        
        .shape-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .shape-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }
        
        .shape-4 {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            top: 30%;
            left: 5%;
            animation-delay: -15s;
        }
        
        .shape-3 {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            top: 50%;
            right: 10%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(5deg); }
            50% { transform: translate(0, -40px) rotate(0deg); }
            75% { transform: translate(-20px, -20px) rotate(-5deg); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); }
        }
        
        .animate-slide-up {
            animation: slideUp 0.8s ease-out forwards;
        }
        
        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        
        .animate-pulse-glow {
            animation: pulse-glow 3s infinite;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group input {
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.4);
        }
        
        .input-icon {
            transition: all 0.3s ease;
        }
        
        .input-group:focus-within .input-icon {
            color: #3b82f6;
            transform: scale(1.1);
        }
        
        .login-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .login-btn:hover::before {
            left: 100%;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.5);
        }
        
        .back-btn {
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            transform: translateX(-5px);
        }
        
        .error-shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">
    <!-- Floating Background Shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <!-- Back Button -->
    <a href="index.html" class="fixed top-6 left-6 back-btn flex items-center gap-2 text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 hover:bg-white/20 transition-all z-10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back to FileVault
    </a>

    <!-- Login Card -->
    <div class="relative w-full max-w-md">
        <!-- Decorative glow -->
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-500 via-purple-500 to-cyan-500 rounded-3xl blur-2xl opacity-30"></div>
        
        <div class="relative bg-slate-900/80 backdrop-blur-xl p-10 rounded-3xl border border-white/10 shadow-2xl animate-slide-up">
            <!-- Logo/Header -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mb-4 shadow-lg shadow-blue-500/30 animate-pulse-glow">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h2 id="formTitle" class="text-3xl font-bold text-white mb-1">Welcome Back</h2>
                <p id="formSubtitle" class="text-white/50 text-sm">Sign in to your FileVault account</p>
            </div>

            <!-- Tabs -->
            <div class="flex bg-white/5 rounded-xl p-1 mb-6 gap-1">
                <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-lg text-sm font-bold transition-all bg-white/10 text-white">Sign In</button>
                <button id="tabSignup" onclick="switchTab('signup')" class="flex-1 py-2.5 rounded-lg text-sm font-bold transition-all text-white/50 hover:text-white/70">Create Account</button>
            </div>

            <!-- Shared Fields -->
            <div class="space-y-4">
                <div class="input-group">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="input-icon w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </div>
                        <input type="email" id="email" placeholder="Email address" 
                            class="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-blue-500/50 focus:bg-white/10 transition-all"/>
                    </div>
                </div>

                <div class="input-group">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="input-icon w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input type="password" id="password" placeholder="Password" 
                            class="w-full pl-12 pr-12 py-4 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-blue-500/50 focus:bg-white/10 transition-all"/>
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center">
                            <svg id="eyeIcon" class="w-5 h-5 text-white/40 hover:text-white/70 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password (signup only) -->
                <div id="confirmPasswordGroup" class="input-group hidden">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="input-icon w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                        </div>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" 
                            class="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-blue-500/50 focus:bg-white/10 transition-all"/>
                    </div>
                </div>

                <!-- Login extras -->
                <div id="loginExtras" class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-white/20 bg-white/5 text-blue-500 focus:ring-blue-500/50 focus:ring-offset-0 cursor-pointer"/>
                        <span class="text-white/50 text-sm">Remember me</span>
                    </label>
                    <a href="#" onclick="forgotPassword()" class="text-sm text-blue-400 hover:text-blue-300 transition-colors">Forgot password?</a>
                </div>

                <!-- Signup note -->
                <div id="signupNote" class="hidden">
                    <p class="text-white/40 text-xs">By signing up, you'll get a standard user account. Admins can upgrade your role from the manager portal.</p>
                </div>

                <button onclick="handleSubmit()" id="loginBtn" class="login-btn w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-4 rounded-xl font-bold hover:from-blue-600 hover:to-purple-700 transition-all shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2">
                    <span id="btnText">Sign In</span>
                    <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                    </svg>
                </button>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-white/30 text-xs font-medium">or continue with</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Social Buttons — Top 4 always visible -->
            <div class="grid grid-cols-2 gap-2.5">
                <button onclick="oauthLogin('google')" class="social-btn flex items-center justify-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold transition-all">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google

                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                    GitHub

                <button onclick="oauthLogin('facebook')" class="social-btn flex items-center justify-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold transition-all">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook
                </button>
                <button onclick="oauthLogin('apple')" class="social-btn flex items-center justify-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold transition-all">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                    Apple

                <button onclick="oauthLogin('twitter')" class="social-btn extra-provider hidden flex items-center justify-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold transition-all">

    <script>
        const _supabase = supabase.createClient('https://lvhecpvwpzmstciewziv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2aGVjcHZ3cHptc3RjaWV3eml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODIzODIsImV4cCI6MjA4NTY1ODM4Mn0.kjaJKidkubl-_-K87WEAe91puG1qoEvJqnfcOiaG2kI');

        let currentTab = 'login';

        // If already logged in, redirect to appropriate page
        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data: profile } = await _supabase.from('user_profiles').select('role').eq('id', session.user.id).single().catch(() => ({ data: null }));
                window.location.href = (profile?.role === 'admin' || profile?.role === 'manager') ? 'manager.html' : 'index.html';
            }
        })();

        function switchTab(tab) {
            currentTab = tab;
            const isLogin = tab === 'login';

            document.getElementById('tabLogin').className = `flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${isLogin ? 'bg-white/10 text-white' : 'text-white/50 hover:text-white/70'}`;
            document.getElementById('tabSignup').className = `flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${!isLogin ? 'bg-white/10 text-white' : 'text-white/50 hover:text-white/70'}`;

            document.getElementById('formTitle').innerText = isLogin ? 'Welcome Back' : 'Create Account';
            document.getElementById('formSubtitle').innerText = isLogin ? 'Sign in to your FileVault account' : 'Join FileVault to browse & share files';
            document.getElementById('confirmPasswordGroup').classList.toggle('hidden', isLogin);
            document.getElementById('loginExtras').classList.toggle('hidden', !isLogin);
            document.getElementById('signupNote').classList.toggle('hidden', isLogin);
            document.getElementById('btnText').innerText = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('msg').innerText = '';
        }

        function setLoading(loading, successText) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = loading;
            btn.classList.toggle('opacity-75', loading);
            btn.classList.toggle('cursor-not-allowed', loading);
            if (loading) {
                btnText.innerText = currentTab === 'login' ? 'Signing in...' : 'Creating account...';
            } else if (successText) {
                btnText.innerText = successText;
            } else {
                btnText.innerText = currentTab === 'login' ? 'Sign In' : 'Create Account';
            }
        }

        function showMsg(text, color = 'red') {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.className = `mt-5 text-center text-sm min-h-[20px] text-${color}-400`;
        }

        async function handleSubmit() {
            if (currentTab === 'login') await signIn();
            else await signUp();
        }

        async function signIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMsg('Please enter both email and password'); return; }

            setLoading(true);
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                setLoading(false);
                showMsg(error.message);
                document.getElementById('loginBtn').closest('.space-y-4').classList.add('error-shake');
                setTimeout(() => document.getElementById('loginBtn').closest('.space-y-4').classList.remove('error-shake'), 500);
            } else {
                setLoading(false, 'Success! Redirecting...');
                // Check role and redirect
                const { data: profile } = await _supabase.from('user_profiles').select('role').eq('id', data.user.id).single().catch(() => ({ data: null }));
                setTimeout(() => {
                    window.location.href = (profile?.role === 'admin' || profile?.role === 'manager') ? 'manager.html' : 'index.html';
                }, 600);
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!email || !password) { showMsg('Please fill in all fields'); return; }
            if (password !== confirm) { showMsg('Passwords do not match'); return; }
            if (password.length < 6) { showMsg('Password must be at least 6 characters'); return; }

            setLoading(true);
            const { data, error } = await _supabase.auth.signUp({ email, password });

            if (error) {
                setLoading(false);
                showMsg(error.message);
            } else {
                // Auto-create user_profiles row with 'user' role
                if (data.user) {
                    await _supabase.from('user_profiles').upsert({
                        id: data.user.id,
                        email: data.user.email,
                        role: 'user'
                    }).catch(() => {});
                }
                setLoading(false, '✓ Account created!');
                showMsg('Account created! Check your email to confirm, then sign in.', 'green');
                setTimeout(() => switchTab('login'), 2500);
            }
        }

        // Enter key support
        ['email', 'password', 'confirmPassword'].forEach(id => {
            document.getElementById(id)?.addEventListener('keypress', e => { if (e.key === 'Enter') handleSubmit(); });
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) { showMsg('Please enter your email first'); return; }
            _supabase.auth.resetPasswordForEmail(email).then(() => {
                showMsg('Password reset link sent to your email', 'green');
            }).catch(err => showMsg(err.message));
        }

        window.addEventListener('offline', () => showMsg('You are offline. Please check your connection.', 'yellow'));

        // Single unified OAuth handler for all providers
        async function oauthLogin(provider) {
            showMsg('Redirecting to ' + provider + '...', 'blue');
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) showMsg(error.message);
        }

        // Show/hide extra providers
        let showingMore = false;
        function toggleMoreProviders() {
            showingMore = !showingMore;
            document.querySelectorAll('.extra-provider').forEach(el => el.classList.toggle('hidden', !showingMore));
            document.getElementById('showMoreText').textContent = showingMore ? 'Show fewer providers' : 'Show 11 more providers';
            document.getElementById('showMoreChevron').style.transform = showingMore ? 'rotate(180deg)' : '';
        }

        // Auto-switch tab if coming from a "create account" link
        if (localStorage.getItem('loginTab') === 'signup') {
            localStorage.removeItem('loginTab');
            switchTab('signup');
        }
    </script>
