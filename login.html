<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FileVault | Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="filevault%20logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; min-height: 100vh; color: #e2e8f0; }
        .bg-fixed-image { position: fixed; inset: 0; background-image: url('screen.png'); background-size: cover; background-position: center; background-repeat: no-repeat; filter: saturate(0.72) brightness(0.5); z-index: -2; }
        .bg-overlay { position: fixed; inset: 0; background: radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 24%), radial-gradient(circle at bottom right, rgba(139,92,246,0.14), transparent 20%), linear-gradient(180deg, rgba(8, 12, 27, 0.88), rgba(4, 7, 18, 0.96)); z-index: -1; pointer-events: none; }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-10px)} 40%,80%{transform:translateX(10px)} }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out 0.3s both; }
        .error-shake { animation: shake 0.5s ease-in-out; }
        .login-btn { position: relative; overflow: hidden; }
        .login-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); transition:left 0.5s ease; }
        .login-btn:hover::before { left:100%; }
        .site-logo { width: 56px; height: 56px; border-radius: 1rem; overflow: hidden; box-shadow: 0 24px 48px rgba(59,130,246,0.2); }
        .site-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .login-btn:hover { transform:translateY(-3px); box-shadow:0 20px 40px -15px rgba(37,99,235,0.5); }
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0px 1000px rgba(255,255,255,0.05) inset !important;
            box-shadow: 0 0 0px 1000px rgba(255,255,255,0.05) inset !important;
            -webkit-text-fill-color: #ffffff !important;
            color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s !important;
            background-color: rgba(255,255,255,0.05) !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
    <div class="bg-fixed-image"></div>
    <div class="bg-overlay"></div>

    <!-- Back Button -->
    <a href="https://jonathan-acheampong042.github.io/Project-One/index.html" class="fixed top-6 left-6 flex items-center gap-2 text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 hover:bg-white/20 transition-all z-10">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to FileVault
    </a>

    <div class="relative w-full max-w-md">
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-500 via-purple-500 to-cyan-500 rounded-3xl blur-2xl opacity-30"></div>

        <div id="loginCard" class="relative bg-slate-900/80 backdrop-blur-xl p-8 rounded-3xl border border-white/10 shadow-2xl animate-slide-up">
            <!-- Logo -->
            <div class="text-center mb-6">
                <div class="site-logo mx-auto mb-3">
                    <img src="filevault%20logo.png" alt="FileVault logo" />
                </div>
                <h2 class="text-2xl font-bold text-white mb-1">Admin Login</h2>
                <p class="text-white/50 text-sm">Sign in to access the manager portal</p>
            </div>

            <div class="space-y-4" id="formFields">
                <!-- Email -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
                    </div>
                    <input type="email" id="email" placeholder="Admin email address" class="w-full pl-12 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-blue-500/50 focus:bg-white/10 transition-all"/>
                </div>

                <!-- Password -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <input type="password" id="password" placeholder="Password" class="w-full pl-12 pr-12 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-blue-500/50 focus:bg-white/10 transition-all"/>
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center">
                        <svg id="eyeIcon" class="w-5 h-5 text-white/40 hover:text-white/70 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-white/5 text-blue-500"/>
                        <span class="text-white/50 text-sm">Remember me</span>
                    </label>
                    <a href="#" onclick="forgotPassword()" class="text-sm text-blue-400 hover:text-blue-300 transition-colors">Forgot password?</a>
                </div>

                <button onclick="handleSubmit()" id="loginBtn" class="login-btn w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3.5 rounded-xl font-bold hover:from-blue-600 hover:to-purple-700 transition-all shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2">
                    <span id="btnText">Sign In</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                </button>
            </div>

            <p id="msg" class="mt-3 text-center text-sm min-h-[20px] text-red-400"></p>
        </div>

        <!-- Reset Password Card (shown when recovery link is clicked) -->
        <div id="resetCard" class="hidden relative bg-slate-900/80 backdrop-blur-xl p-8 rounded-3xl border border-white/10 shadow-2xl animate-slide-up">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-green-500 to-teal-600 rounded-2xl mb-3 shadow-lg">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-white mb-1">Set New Password</h2>
                <p class="text-white/50 text-sm">Enter your new password below</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <input type="password" id="newPassword" placeholder="New password" class="w-full pl-12 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-green-500/50 focus:bg-white/10 transition-all"/>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm new password" class="w-full pl-12 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none text-white placeholder-white/40 focus:border-green-500/50 focus:bg-white/10 transition-all"/>
                </div>
                <button onclick="setNewPassword()" id="resetBtn" class="login-btn w-full bg-gradient-to-r from-green-500 to-teal-600 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                    <span id="resetBtnText">Update Password</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
            <p id="resetMsg" class="mt-3 text-center text-sm min-h-[20px] text-red-400"></p>
        </div>

        <p class="text-center text-white/30 text-xs mt-5 animate-fade-in">Secure admin access · FileVault</p>
        <p class="text-center text-white/20 text-xs mt-2 animate-fade-in">Built by <span class="text-white/40 font-semibold">Jonathan Acheampong</span></p>
    </div>

    <script>
        const BASE = 'https://jonathan-acheampong042.github.io/Project-One';
        const _supabase = supabase.createClient(
            'https://lvhecpvwpzmstciewziv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2aGVjcHZ3cHptc3RjaWV3eml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODIzODIsImV4cCI6MjA4NTY1ODM4Mn0.kjaJKidkubl-_-K87WEAe91puG1qoEvJqnfcOiaG2kI'
        );

        // ── Handle password recovery link 
       // Detect recovery token in URL hash on page load
        if (window.location.hash.includes('type=recovery')) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('resetCard').classList.remove('hidden');
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('loginCard').classList.add('hidden');
                document.getElementById('resetCard').classList.remove('hidden');
            }
        });

        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                try {
                    const { data: profile } = await _supabase
                        .from('user_profiles').select('role').eq('id', session.user.id).single();
                    if (profile?.role === 'admin' || profile?.role === 'manager') {
                        window.location.href = BASE + '/manager.html';
                    }
                } catch(e) {}
            }
        })();

        function setLoading(loading, text) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = loading;
            btn.classList.toggle('opacity-70', loading);
            document.getElementById('btnText').innerText = text || 'Sign In';
        }

        function showMsg(text, color = 'red') {
            const el = document.getElementById('msg');
            el.innerText = text;
            el.className = `mt-3 text-center text-sm min-h-[20px] text-${color}-400`;
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMsg('Please enter both email and password'); return; }

            setLoading(true, 'Signing in...');

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                setLoading(false);
                showMsg(error.message);
                document.getElementById('loginBtn').classList.add('error-shake');
                setTimeout(() => document.getElementById('loginBtn').classList.remove('error-shake'), 500);
                return;
            }

        
            try {
                const { data: profile } = await _supabase
                    .from('user_profiles').select('role').eq('id', data.user.id).single();

                if (profile?.role === 'admin' || profile?.role === 'manager') {
                    setLoading(false, '✓ Redirecting...');
                    setTimeout(() => { window.location.href = BASE + '/manager.html'; }, 500);
                } else {
                    await _supabase.auth.signOut();
                    setLoading(false);
                    showMsg('Access denied. Admin credentials only.');
                }
            } catch(e) {
                await _supabase.auth.signOut();
                setLoading(false);
                showMsg('Could not verify role. Please try again.');
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        async function setNewPassword() {
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmNewPassword').value;
            const resetMsg = document.getElementById('resetMsg');

            if (!newPwd) { resetMsg.className = 'mt-3 text-center text-sm min-h-[20px] text-red-400'; resetMsg.innerText = 'Please enter a new password'; return; }
            if (newPwd.length < 6) { resetMsg.className = 'mt-3 text-center text-sm min-h-[20px] text-red-400'; resetMsg.innerText = 'Password must be at least 6 characters'; return; }
            if (newPwd !== confirmPwd) { resetMsg.className = 'mt-3 text-center text-sm min-h-[20px] text-red-400'; resetMsg.innerText = 'Passwords do not match'; return; }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            document.getElementById('resetBtnText').innerText = 'Updating...';

            const { error } = await _supabase.auth.updateUser({ password: newPwd });

            if (error) {
                btn.disabled = false;
                document.getElementById('resetBtnText').innerText = 'Update Password';
                resetMsg.className = 'mt-3 text-center text-sm min-h-[20px] text-red-400';
                resetMsg.innerText = error.message;
            } else {
                document.getElementById('resetBtnText').innerText = '✓ Password updated!';
                resetMsg.className = 'mt-3 text-center text-sm min-h-[20px] text-green-400';
                resetMsg.innerText = 'Password updated successfully. Redirecting to manager...';
                setTimeout(() => { window.location.href = BASE + '/manager.html'; }, 2000);
            }
        }

        function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) { showMsg('Enter your email first'); return; }
            _supabase.auth.resetPasswordForEmail(email, { redirectTo: BASE + '/login.html' })
                .then(() => showMsg('Password reset link sent!', 'green'))
                .catch(e => showMsg(e.message));
        }

        ['email', 'password'].forEach(id => {
            document.getElementById(id)?.addEventListener('keypress', e => { if (e.key === 'Enter') handleSubmit(); });
        });

        window.addEventListener('offline', () => showMsg('You are offline', 'yellow'));
    </script>
</body>
</html>
