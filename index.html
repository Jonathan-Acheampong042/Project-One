<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><path d='M50 2 L90 15 L90 55 Q90 88 50 98 Q10 88 10 55 L10 15 Z' fill='url(%23g)'/><circle cx='40' cy='45' r='11' fill='white' opacity='.25'/><circle cx='50' cy='40' r='13' fill='white' opacity='.25'/><circle cx='61' cy='45' r='10' fill='white' opacity='.25'/><rect x='31' y='45' width='38' height='14' rx='2' fill='white' opacity='.25'/><rect x='42' y='51' width='16' height='12' rx='3' fill='white' opacity='.9'/><path d='M45 51 L45 47 Q50 41 55 47 L55 51' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' opacity='.9'/><circle cx='50' cy='56' r='2' fill='%236366f1'/><rect x='49' y='56' width='2' height='4' rx='1' fill='%236366f1'/></svg>">
    <title>FileVault | User Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .floating-shapes { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .shape { position: absolute; border-radius: 50%; opacity: 0.08; animation: float 25s infinite ease-in-out; }
        .shape-1 { width: 400px; height: 400px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); top: -150px; left: -150px; animation-delay: 0s; }
        .shape-2 { width: 300px; height: 300px; background: linear-gradient(135deg, #06b6d4, #3b82f6); bottom: -100px; right: -100px; animation-delay: -8s; }
        .shape-3 { width: 200px; height: 200px; background: linear-gradient(135deg, #8b5cf6, #ec4899); top: 40%; right: 5%; animation-delay: -15s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 25% { transform: translate(30px, -30px) rotate(5deg); } 50% { transform: translate(0, -50px) rotate(0deg); } 75% { transform: translate(-30px, -30px) rotate(-5deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-slide-up { animation: slideUp 0.7s ease-out forwards; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .file-item { transition: all 0.3s ease; }
        .file-item:hover { background: rgba(255, 255, 255, 0.07); }
        .folder-item { transition: all 0.3s ease; }
        .folder-item:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.1); }
        .folder-item.active { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); }
        .search-input { transition: all 0.3s ease; }
        .search-input:focus { box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .suggested-card { transition: all 0.4s ease; }
        .suggested-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3); }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body class="min-h-screen font-sans text-white relative">

    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header class="glass-card border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <span class="material-symbols-outlined text-white text-xl">cloud_circle</span>
                </div>
                <h1 class="font-bold text-xl tracking-tight text-white">FileVault</h1>
            </div>
            <div class="w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-lg hover:scale-110 transition-transform cursor-pointer" onclick="toggleFolderSection()" title="Toggle Folders">
                U
            </div>
        </div>
    </header>

    <div class="glass-card border-b border-white/10 px-4 py-3 sticky top-[57px] z-40">
        <div class="max-w-7xl mx-auto relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-white/40">search</span>
            </div>
            <input id="searchInput" oninput="filterFiles(this.value)"
                class="search-input block w-full pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/40 focus:border-blue-500/50 focus:bg-white/10 outline-none transition-all"
                placeholder="Search in FileVault..." type="text"/>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 pb-32 relative z-10">

        <!-- Suggested -->
        <div id="suggestedSection" class="mb-8 hidden">
            <h3 class="text-xs font-bold text-white/50 uppercase tracking-wider mb-3">Suggested For You</h3>
            <div id="suggestedGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>

        <!-- Folders -->
        <div id="folderSection" class="mb-8">
            <h3 class="text-xs font-bold text-white/50 uppercase tracking-wider mb-3">Folders</h3>
            <div id="folderGrid" class="flex flex-wrap gap-2">
                <div class="text-white/40 text-sm italic">Loading folders...</div>
            </div>
        </div>

        <!-- File List -->
        <div id="fileListSection">
            <div class="flex justify-between items-end mb-3 border-b border-white/10 pb-2">
                <h3 class="text-xs font-bold text-white/50 uppercase tracking-wider">All Files</h3>
                <div class="flex items-center gap-2">
                    <select id="sortSelect" onchange="sortFiles(this.value)" class="text-xs text-white/70 bg-white/5 border border-white/10 rounded-lg px-2 py-1 outline-none cursor-pointer hover:bg-white/10 transition-all">
                        <option value="newest" class="text-black">Newest</option>
                        <option value="oldest" class="text-black">Oldest</option>
                        <option value="name" class="text-black">Name</option>
                    </select>
                    <span id="fileCount" class="text-[10px] text-white/40 font-bold"></span>
                </div>
            </div>
            <div id="fileGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="col-span-full flex justify-center py-10">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 glass-card border-t border-white/10 p-4 z-50">
        <div class="max-w-7xl mx-auto text-center">
            <a href="login.html" class="inline-flex items-center gap-2 text-xs font-bold text-white/40 hover:text-blue-400 transition-colors">
                <span class="material-symbols-outlined text-sm">lock</span>
                Manager Portal Access
            </a>
        </div>
    </div>

<script>
    const _supabase = supabase.createClient(
        'https://lvhecpvwpzmstciewziv.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2aGVjcHZ3cHptc3RjaWV3eml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODIzODIsImV4cCI6MjA4NTY1ODM4Mn0.kjaJKidkubl-_-K87WEAe91puG1qoEvJqnfcOiaG2kI'
    );

    let allFiles = [];
    let currentFolder = null;
    let isOnline = navigator.onLine;

    // ─── HELPERS ────────────────────────────────────────────────
    function getFileIcon(fileName) {
        const n = (fileName || '').toLowerCase();
        if (n.endsWith('.pdf')) return 'picture_as_pdf';
        if (n.endsWith('.pptx') || n.endsWith('.ppt')) return 'slideshow';
        if (n.endsWith('.docx') || n.endsWith('.doc')) return 'description';
        if (n.endsWith('.xlsx') || n.endsWith('.csv')) return 'table_chart';
        if (n.endsWith('.zip') || n.endsWith('.rar')) return 'folder_zip';
        if (n.endsWith('.jpg') || n.endsWith('.jpeg') || n.endsWith('.png')) return 'image';
        return 'description';
    }

    function getFileColor(fileName) {
        const n = (fileName || '').toLowerCase();
        if (n.endsWith('.pdf')) return 'text-red-400 bg-red-500/10';
        if (n.endsWith('.docx') || n.endsWith('.doc')) return 'text-blue-400 bg-blue-500/10';
        if (n.endsWith('.pptx') || n.endsWith('.ppt')) return 'text-orange-400 bg-orange-500/10';
        if (n.endsWith('.xlsx') || n.endsWith('.csv')) return 'text-green-400 bg-green-500/10';
        if (n.endsWith('.jpg') || n.endsWith('.jpeg') || n.endsWith('.png')) return 'text-purple-400 bg-purple-500/10';
        return 'text-white/60 bg-white/5';
    }

    function formatDate(str) {
        if (!str) return '';
        return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ─── TOGGLE FOLDER SECTION ───────────────────────────────────
    let folderSectionVisible = true;
    function toggleFolderSection() {
        const section = document.getElementById('folderSection');
        folderSectionVisible = !folderSectionVisible;
        if (folderSectionVisible) {
            section.classList.remove('hidden');
        } else {
            section.classList.add('hidden');
        }
    }

    // Sort files
    let currentSort = 'newest';
    function sortFiles(sortType) {
        currentSort = sortType;
        renderAll(allFiles);
    }

    function applyUserSort(files) {
        switch (currentSort) {
            case 'oldest':
                return files.sort((a, b) => new Date(a.date) - new Date(b.date));
            case 'name':
                return files.sort((a, b) => a.name.localeCompare(b.name));
            case 'newest':
            default:
                return files.sort((a, b) => new Date(b.date) - new Date(a.date));
        }
    }

    // ─── FETCH: DB first, fall back to Storage ───────────────────
    async function fetchFiles() {
        const fileGrid = document.getElementById('fileGrid');

        try {
            // PRIMARY SOURCE: Database table
            const { data: dbData, error: dbError } = await _supabase
                .from('files_list')
                .select('*')
                .order('created_at', { ascending: false });

            if (dbError) throw dbError;

            if (dbData && dbData.length > 0) {
                // Map DB rows into unified format
                allFiles = dbData.map(row => ({
                    name: row.file_name,
                    folder: row.folder_name === 'Root' ? null : row.folder_name,
                    url: row.download_url,
                    date: new Date(row.created_at),
                    source: 'db'
                }));
            } else {
                // FALLBACK: Storage bucket (for files uploaded before DB sync)
                const { data: storageData, error: storageError } = await _supabase.storage
                    .from('vault-files')
                    .list('', { limit: 200, sortBy: { column: 'created_at', order: 'desc' }, recursive: true });

                if (storageError) throw storageError;

                const realFiles = (storageData || []).filter(f =>
                    f.id !== null &&
                    !f.name.endsWith('.emptyFolderPlaceholder') &&
                    f.name !== 'uploads'
                );

                allFiles = realFiles.map(file => {
                    const { data: urlData } = _supabase.storage.from('vault-files').getPublicUrl(file.name);
                    const displayName = file.name.split('/').pop();
                    const folderName = file.name.includes('/') ? file.name.split('/')[0] : null;
                    return {
                        name: displayName,
                        folder: folderName,
                        url: urlData.publicUrl,
                        date: new Date(file.created_at),
                        source: 'storage'
                    };
                });
            }

            if (allFiles.length === 0) {
                fileGrid.innerHTML = `<div class="text-center py-10 text-white/40 col-span-full">No files available yet. Manager is yet to upload.</div>`;
                document.getElementById('folderGrid').innerHTML = '';
                return;
            }

            renderAll(allFiles);

        } catch (err) {
            console.error(err);
            fileGrid.innerHTML = `<div class="text-center py-10 text-red-400 col-span-full">Error loading library: ${err.message}</div>`;
        }
    }

    // ─── RENDER ALL ──────────────────────────────────────────────
    function renderAll(files) {
        // Apply sorting
        files = applyUserSort([...files]);

        // Suggested: Top 4 newest
        const suggestedGrid = document.getElementById('suggestedGrid');
        const suggested = files.slice(0, 4);
        if (suggested.length > 0) {
            document.getElementById('suggestedSection').classList.remove('hidden');
            suggestedGrid.innerHTML = suggested.map(file => {
                const icon = getFileIcon(file.name);
                const [textColor, bgColor] = getFileColor(file.name).split(' ');
                return `
                <div class="suggested-card glass-card p-5 rounded-2xl flex flex-col justify-between h-44 relative overflow-hidden group cursor-pointer" onclick="window.open('${file.url}','_blank')">
                    <div class="${bgColor} w-14 h-14 rounded-xl flex items-center justify-center mb-3 shrink-0">
                        <span class="material-symbols-outlined ${textColor} text-3xl">${icon}</span>
                    </div>
                    <div class="z-10">
                        <p class="font-bold text-white text-sm truncate mb-1" title="${file.name}">${file.name}</p>
                        <p class="text-[10px] text-white/40 flex items-center gap-1 mb-1">
                            <span class="material-symbols-outlined text-[10px]">folder</span> ${file.folder || 'Root'}
                        </p>
                        ${file.date ? `<p class="text-[10px] text-white/30 mb-2">${formatDate(file.date)}</p>` : ''}
                        <a href="${file.url}" target="_blank" onclick="event.stopPropagation()" class="text-xs font-bold text-blue-400 hover:text-blue-300 flex items-center gap-1 transition-colors">
                            <span class="material-symbols-outlined text-sm">download</span> Download
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        // Folders
        const folders = [...new Set(files.map(f => f.folder).filter(Boolean))].sort();
        const folderGrid = document.getElementById('folderGrid');
        if (folders.length > 0) {
            let html = `
                <div onclick="filterByFolder(null)" class="folder-item active glass-card px-4 py-2 rounded-xl cursor-pointer border border-white/10 hover:border-white/20 transition-all text-sm text-white/70 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">folder</span> All Files
                </div>`;
            folders.forEach(folder => {
                const count = files.filter(f => f.folder === folder).length;
                html += `
                <div onclick="filterByFolder('${folder}')" class="folder-item glass-card px-4 py-2 rounded-xl cursor-pointer border border-white/10 hover:border-white/20 transition-all text-sm text-white/70 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">folder</span> ${folder}
                    <span class="text-[10px] text-white/30 ml-1">${count}</span>
                </div>`;
            });
            folderGrid.innerHTML = html;
        } else {
            folderGrid.innerHTML = '';
        }

        renderFileList(files);
    }

    // ─── RENDER FILE LIST ─────────────────────────────────────────
    function renderFileList(filesToRender) {
        const fileGrid = document.getElementById('fileGrid');
        document.getElementById('fileCount').innerText = `${filesToRender.length} file${filesToRender.length !== 1 ? 's' : ''}`;

        if (filesToRender.length === 0) {
            fileGrid.innerHTML = `<p class="text-center text-white/40 py-10 text-sm col-span-full">No files found.</p>`;
            return;
        }

        fileGrid.innerHTML = filesToRender.map(file => {
    const icon = getFileIcon(file.name);
    const [textColor, bgColor] = getFileColor(file.name).split(' ');
    return `
    <div class="file-item glass-card p-3 rounded-xl border border-white/5 hover:border-white/20 transition-all flex items-center gap-3">
        <div class="${bgColor} w-10 h-10 rounded-lg flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined ${textColor} text-xl">${icon}</span>
        </div>
        <div class="min-w-0 flex-1">
            <p class="font-semibold text-white/80 text-sm truncate" title="${file.name}">${file.name}</p>
            <p class="text-[10px] text-white/30 mt-0.5">${file.folder || 'Root'} ${file.date ? '· ' + formatDate(file.date) : ''}</p>
        </div>
        <div class="flex gap-1.5 shrink-0">
            <a href="${file.url}" target="_blank"
                class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-white/5 hover:bg-blue-500/20 text-white/50 hover:text-blue-400 text-xs transition-all">
                <span class="material-symbols-outlined text-sm">visibility</span> View
            </a>
            <a href="${file.url}" download
                class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-white/5 hover:bg-purple-500/20 text-white/50 hover:text-purple-400 text-xs transition-all">
                <span class="material-symbols-outlined text-sm">download</span>
            </a>
        </div>
    </div>`;
}).join('');
    }

    // ─── FILTERS ──────────────────────────────────────────────────
    function filterByFolder(folder) {
        currentFolder = folder;
        // Update active state on folder buttons
        document.querySelectorAll('.folder-item').forEach(btn => btn.classList.remove('active'));
        event && event.currentTarget && event.currentTarget.classList.add('active');

        const filtered = folder === null ? allFiles : allFiles.filter(f => f.folder === folder);
        renderFileList(filtered);
    }

    function filterFiles(searchTerm) {
        const term = searchTerm.toLowerCase();
        let filtered = allFiles.filter(f => f.name.toLowerCase().includes(term));
        if (currentFolder) filtered = filtered.filter(f => f.folder === currentFolder);
        renderFileList(filtered);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + F: Focus search
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
        // Escape: Close folder section
        if (e.key === 'Escape') {
            if (folderSectionVisible) toggleFolderSection();
        }
    });

    // ─── OFFLINE HANDLING ───────────────────────────────────────
    function updateOnlineStatus() {
        isOnline = navigator.onLine;
        const header = document.querySelector('header');
        if (!isOnline) {
            header.classList.add('border-red-500/50');
            const existingBadge = document.getElementById('offlineBadge');
            if (!existingBadge) {
                const badge = document.createElement('div');
                badge.id = 'offlineBadge';
                badge.className = 'absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold';
                badge.innerText = 'Offline';
                header.style.position = 'relative';
                header.appendChild(badge);
            }
        } else {
            header.classList.remove('border-red-500/50');
            const badge = document.getElementById('offlineBadge');
            if (badge) badge.remove();
        }
    }

    // Listen for online/offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Override fetch function to handle offline
    const originalFetchFiles = window.fetchFiles;
    window.fetchFiles = async function() {
        if (!navigator.onLine) {
            const fileGrid = document.getElementById('fileGrid');
            fileGrid.innerHTML = `
                <div class="col-span-full text-center py-10">
                    <span class="material-symbols-outlined text-4xl text-white/30 mb-4 block">wifi_off</span>
                    <p class="text-white/60 font-medium mb-2">You're offline</p>
                    <p class="text-white/40 text-sm">Please check your internet connection and try again.</p>
                    <button onclick="fetchFiles()" class="mt-4 px-4 py-2 bg-blue-500/20 hover:bg-blue-500/30 text-blue-400 rounded-lg text-sm transition-all">
                        <span class="material-symbols-outlined text-sm mr-1">refresh</span> Retry
                    </button>
                </div>`;
            document.getElementById('folderGrid').innerHTML = '';
            return;
        }
        if (originalFetchFiles) await originalFetchFiles();
    };

    // Initialize online status
    updateOnlineStatus();

    // Start
    fetchFiles();
</script>
    <script src="chat-widget.js"></script>
</body>
</html>
