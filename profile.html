<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FileVault | Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><path d='M50 2 L90 15 L90 55 Q90 88 50 98 Q10 88 10 55 L10 15 Z' fill='url(%23g)'/><circle cx='40' cy='45' r='11' fill='white' opacity='.25'/><circle cx='50' cy='40' r='13' fill='white' opacity='.25'/><circle cx='61' cy='45' r='10' fill='white' opacity='.25'/><rect x='31' y='45' width='38' height='14' rx='2' fill='white' opacity='.25'/><rect x='42' y='51' width='16' height='12' rx='3' fill='white' opacity='.9'/><path d='M45 51 L45 47 Q50 41 55 47 L55 51' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' opacity='.9'/><circle cx='50' cy='56' r='2' fill='%236366f1'/><rect x='49' y='56' width='2' height='4' rx='1' fill='%236366f1'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .floating-shapes { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .shape { position: absolute; border-radius: 50%; opacity: 0.08; animation: float 25s infinite ease-in-out; }
        .shape-1 { width: 400px; height: 400px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); top: -150px; left: -150px; }
        .shape-2 { width: 300px; height: 300px; background: linear-gradient(135deg, #06b6d4, #3b82f6); bottom: -100px; right: -100px; animation-delay: -8s; }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .provider-btn { transition: all 0.2s ease; }
        .provider-btn:hover { transform: translateY(-2px); }
        .avatar-ring { background: conic-gradient(from 0deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6); border-radius: 50%; padding: 3px; }
    </style>
</head>
<body class="min-h-screen text-white relative">

    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Header -->
    <header class="glass-card border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="https://jonathan-acheampong042.github.io/Project-One/index.html" class="flex items-center gap-2 hover:opacity-80 transition-all">
                <span class="material-symbols-outlined text-white/60">arrow_back</span>
                <span class="text-sm text-white/60 font-medium">Back to FileVault</span>
            </a>
            <span class="text-sm font-bold text-white/40">My Profile</span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8 relative z-10 space-y-6 animate-slide-up">

        <!-- Profile Card -->
        <div class="glass-card rounded-3xl p-6">
            <!-- Avatar + Name -->
            <div class="flex flex-col items-center text-center mb-6">
                <div class="avatar-ring mb-4">
                    <div id="avatarCircle" class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-3xl font-bold text-white">
                        ?
                    </div>
                </div>
                <h2 id="profileName" class="text-xl font-bold text-white">Loading...</h2>
                <p id="profileEmailDisplay" class="text-sm text-white/50 mt-0.5"></p>
                <div id="roleBadge" class="mt-2 px-3 py-1 rounded-full text-xs font-bold bg-blue-500/20 text-blue-400">User</div>
            </div>

            <!-- Stats row -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-white/5 rounded-2xl p-3 text-center">
                    <p id="statJoined" class="text-xs font-bold text-white">—</p>
                    <p class="text-[10px] text-white/40 mt-0.5">Joined</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-3 text-center">
                    <p id="statProvider" class="text-xs font-bold text-white">—</p>
                    <p class="text-[10px] text-white/40 mt-0.5">Sign-in</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-3 text-center">
                    <p id="statRole" class="text-xs font-bold text-white">—</p>
                    <p class="text-[10px] text-white/40 mt-0.5">Role</p>
                </div>
            </div>

            <!-- Connected accounts -->
            <div>
                <h3 class="text-xs font-bold text-white/40 uppercase tracking-wider mb-3">Connected Accounts</h3>
                <div id="connectedAccounts" class="space-y-2">
                    <!-- filled by JS -->
                </div>
            </div>
        </div>

        <!-- Link more accounts -->
        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-sm font-bold text-white mb-1">Link Another Account</h3>
            <p class="text-xs text-white/40 mb-4">Connect more sign-in methods to your profile</p>
            <div class="grid grid-cols-2 gap-2.5">
                <button onclick="linkProvider('google')" class="provider-btn flex items-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google
                </button>
                <button onclick="linkProvider('github')" class="provider-btn flex items-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                    GitHub
                </button>
                <button onclick="linkProvider('facebook')" class="provider-btn flex items-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook
                </button>
                <button onclick="linkProvider('discord')" class="provider-btn flex items-center gap-2 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl text-white/70 hover:text-white text-xs font-semibold">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.045.033.06a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                    Discord
                </button>
            </div>
            <p id="linkMsg" class="mt-3 text-xs text-center min-h-[16px]"></p>
        </div>

        <!-- Danger zone -->
        <div class="glass-card rounded-3xl p-6 border border-red-500/10">
            <h3 class="text-sm font-bold text-white mb-1">Account</h3>
            <p class="text-xs text-white/40 mb-4">Manage your account settings</p>
            <div class="space-y-2">
                <button onclick="changePassword()" class="w-full flex items-center gap-3 px-4 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-sm text-white/70 hover:text-white transition-all text-left">
                    <span class="material-symbols-outlined text-sm">lock_reset</span>
                    Change Password
                </button>
                <button onclick="confirmSignOut()" class="w-full flex items-center gap-3 px-4 py-3 bg-red-500/10 hover:bg-red-500/20 rounded-xl text-sm text-red-400 hover:text-red-300 transition-all text-left">
                    <span class="material-symbols-outlined text-sm">logout</span>
                    Sign Out
                </button>
            </div>
        </div>

    </main>

    <script>
        const BASE = 'https://jonathan-acheampong042.github.io/Project-One';
        const _supabase = supabase.createClient(
            'https://lvhecpvwpzmstciewziv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2aGVjcHZ3cHptc3RjaWV3eml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODIzODIsImV4cCI6MjA4NTY1ODM4Mn0.kjaJKidkubl-_-K87WEAe91puG1qoEvJqnfcOiaG2kI'
        );

        const PROVIDER_ICONS = {
            google: `<svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>`,
            github: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>`,
            facebook: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
            discord: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.045.033.06a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`,
            email: `<span class="material-symbols-outlined text-base text-white/60">mail</span>`
        };

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = BASE + '/login.html'; return; }

            const user = session.user;
            const email = user.email || '';
            const initial = email ? email[0].toUpperCase() : '?';
            const providers = user.app_metadata?.providers || [user.app_metadata?.provider || 'email'];
            const joinedDate = new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            const mainProvider = providers[0] || 'email';

            // Get role
            let role = 'user';
            try {
                const { data: profile } = await _supabase.from('user_profiles').select('role').eq('id', user.id).single();
                if (profile?.role) role = profile.role;
            } catch(e) {}

            // Fill profile card
            document.getElementById('avatarCircle').textContent = initial;
            document.getElementById('profileName').textContent = user.user_metadata?.full_name || user.user_metadata?.name || email.split('@')[0];
            document.getElementById('profileEmailDisplay').textContent = email;
            document.getElementById('statJoined').textContent = joinedDate;
            document.getElementById('statProvider').textContent = mainProvider.charAt(0).toUpperCase() + mainProvider.slice(1);
            document.getElementById('statRole').textContent = role.charAt(0).toUpperCase() + role.slice(1);

            const roleColors = { admin: 'bg-purple-500/20 text-purple-400', manager: 'bg-blue-500/20 text-blue-400', user: 'bg-white/10 text-white/60' };
            const roleLabels = { admin: '🛡️ Admin', manager: '🔧 Manager', user: '👤 User' };
            const badge = document.getElementById('roleBadge');
            badge.className = `mt-2 px-3 py-1 rounded-full text-xs font-bold ${roleColors[role] || roleColors.user}`;
            badge.textContent = roleLabels[role] || role;

            // Connected accounts
            const container = document.getElementById('connectedAccounts');
            if (providers.length === 0) {
                container.innerHTML = `<p class="text-xs text-white/30 italic">No connected accounts</p>`;
            } else {
                container.innerHTML = providers.map(p => `
                    <div class="flex items-center gap-3 px-3 py-2.5 bg-white/5 rounded-xl">
                        ${PROVIDER_ICONS[p] || PROVIDER_ICONS.email}
                        <span class="text-sm text-white/80 font-medium capitalize">${p}</span>
                        <span class="ml-auto text-[10px] text-green-400 font-bold">● Connected</span>
                    </div>
                `).join('');
            }
        }

        async function linkProvider(provider) {
            const msg = document.getElementById('linkMsg');
            msg.textContent = `Linking ${provider}...`;
            msg.className = 'mt-3 text-xs text-center text-blue-400 min-h-[16px]';
            const { error } = await _supabase.auth.linkIdentity({ provider, options: { redirectTo: BASE + '/profile.html' } });
            if (error) {
                msg.textContent = error.message;
                msg.className = 'mt-3 text-xs text-center text-red-400 min-h-[16px]';
            }
        }

        async function changePassword() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session?.user?.email) return;
            const { error } = await _supabase.auth.resetPasswordForEmail(session.user.email);
            const msg = document.getElementById('linkMsg');
            if (error) {
                msg.textContent = error.message;
                msg.className = 'mt-3 text-xs text-center text-red-400 min-h-[16px]';
            } else {
                msg.textContent = '✓ Password reset email sent!';
                msg.className = 'mt-3 text-xs text-center text-green-400 min-h-[16px]';
            }
        }

        async function confirmSignOut() {
            await _supabase.auth.signOut();
            window.location.href = BASE + '/login.html';
        }

        init();
    </script>
</body>
</html>
